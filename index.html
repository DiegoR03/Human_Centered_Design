<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <section id="video-box" class="panel panel-yellow">
            <h2>Video</h2>
            <p>Podcast - Astrum Space - We've never seen a supernova explode until now</p>
            <video id="media-video" controls src="uploads/SupernovaPodcast.mp4" poster="" playsinline>
                <track kind="captions" label="captions" srclang="en" src="uploads/SupernovaPodcast.vtt" />
            </video>
        </section>

        <section id="audio-box" class="panel panel-red">
            <h2>Chapters</h2>
            <p>Click a chapter to jump in the video above.</p>
            <ul id="chapter-list" class="chapter-list"></ul>
        </section>

        <section id="transcript-box" class="panel">
            <h2>Transcript</h2>
            <p>Emotie: </p>
            <div id="transcript">
            </div>
            <button id="sync-transcript">
                Synchronise Text
            </button>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
